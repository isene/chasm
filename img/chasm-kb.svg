  <rect x="1070" y="72" width="14" height="14" fill="#FF8888" rx="2"/>
  <text x="1092" y="83" class="lg">Mod4 &#8212; the desktop (tile &#183; spot &#183; frame)</text>

  <rect x="1070" y="96" width="14" height="14" fill="#88BBFF" rx="2"/>
