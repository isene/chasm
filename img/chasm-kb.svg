  <rect x="1070" y="120" width="14" height="14" fill="#DDAAFF" rx="2"/>
  <text x="1092" y="131" class="lg">Alt &#8212; glass (unbound keys pass as Meta)</text>

  <rect x="1070" y="144" width="14" height="14" fill="#88FF88" rx="2"/>
  <text x="1092" y="155" class="lg">Ctrl+Alt &#8212; server (frame)</text>

  <text x="1070" y="192" class="lg">Ctrl+Alt+F1..F12&#160;&#160;switch VT</text>
  <text x="1070" y="212" class="lg">blank_key (framerc)&#160;&#160;panel off now</text>
  <text x="1070" y="232" class="lg">Expos&#233; is modal: j/k/&#8593;/&#8595; move,</text>
  <text x="1070" y="248" class="lg">Enter jumps, Esc closes</text>

  <text x="1070" y="288" class="lg" fill="#888">Run `chasm-keys` in a glass for the</text>
  <text x="1070" y="304" class="lg" fill="#888">live table incl. your own exec binds</text>
